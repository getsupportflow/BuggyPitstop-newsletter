<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buggy Pitstop — Newsletter Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #EDEEF2;
    font-family: 'DM Sans', Helvetica, Arial, sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 0 16px 64px;
  }

  header {
    background: #3B5BAD;
    text-align: center;
    padding: 40px 20px 36px;
    margin-bottom: 48px;
  }

  header img {
    height: 48px;
    margin-bottom: 16px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  header h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 28px;
    color: #ffffff;
    letter-spacing: -0.02em;
  }

  header p {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-top: 6px;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
  }

  h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 22px;
    color: #1a1a2e;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  .issue-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .issue-card {
    background: #ffffff;
    border-radius: 8px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }

  .issue-card:hover {
    box-shadow: 0 4px 24px rgba(59,91,173,0.15);
    transform: translateY(-1px);
  }

  .issue-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .issue-title {
    font-weight: 600;
    font-size: 16px;
    color: #1a1a2e;
  }

  .issue-date {
    font-size: 13px;
    color: #888;
  }

  .issue-badge {
    background: #3B5BAD;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .issue-badge.latest {
    background: #FBBF24;
    color: #92400E;
  }

  footer {
    text-align: center;
    margin-top: 56px;
    font-size: 12px;
    color: #aaa;
  }

  footer a { color: #3B5BAD; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>Buggy Pitstop Newsletter</h1>
  <p>Tips, offers &amp; updates for pushchair owners</p>
</header>

<div class="container">
  <h2>All</h2>

  <div class="issue-list">

    <a class="issue-card" href="april-2026.html">
      <div class="issue-meta">
        <span class="issue-title">April 2026 — Free Home Delivery Event</span>
        <span class="issue-date">April 2026</span>
      </div>
      <span class="issue-badge latest">Latest</span>
    </a>

  </div>
</div>

<footer>
  <p>&copy; 2026 <a href="https://buggypitstop.co.uk">Buggy Pitstop</a> &mdash; All rights reserved.</p>
</footer>

</body>
</html>
